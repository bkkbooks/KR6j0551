body:
  text: 夫欲遍供普濟者虞懇至誠嚴飾道場隨力備辦香花供養飲食淨水等已依位敷坐竟歸依上師三寶發菩提心云歸依上師歸依佛歸依法歸依僧我今發心不為自求人天福報聲聞緣覺乃至權乘諸位菩薩唯依最上乘發菩提心願與法界衆生一時同得阿耨多羅三藐三菩提三白已用右手無名指搵取香水塗二手掌表敬仰故無壇略作詳之可見或加不空羂索經內真言淨水塗掌時念淨手真言曰唵啞穆渴拶辣彌麻迎蘇嚕蘇嚕莎訶默念大輪明王呪七遍其呪印者甘露軍茶利菩薩念誦儀云二手內相叉直竪二頭指相並以二中指纏二頭指初節前各頭相拄二大指並伸直結印當心誦呪曰捺麻斯得哩三合野一脫夷二合葛喃二薩哩斡二合怛塔葛達喃三唵四微囉積五微囉積六麻訶拶葛囉二合七斡資哩二合斡資哩二合八薩怛薩怛九薩囉諦十薩囉諦十一得囉二合夷十二得囉二合夷十三微馱麻尼十四三攀拶納禰十五得囉二合麻禰的十六席塔訖哩二合得蘭二合顏席提脫夷二合莎訶十七雜呪經云誦此陀羅尼三七遍即當入一切曼拏羅所作皆成阿閦如來念誦法云安印於心誦一七遍猶誦此真言如再入壇輪失念破三昧菩薩與聲聞身口二律儀四重五無間是等諸罪障悉皆得清淨此補文中須依師授則可矣衆等發廣大心即應潔淨身心虔懇苦禱歸依三寶南無佛南無法南無僧我今發廣大心不為自求人天福報緣覺聲聞乃至權乘諸位菩薩唯依最上乘發菩提心願與法界衆生一時同得阿耨多羅三藐三菩提即召請三寶云一心奉請十方遍法界微塵剎土中諸佛法僧金剛密迹衛法神王天龍八部婆羅門仙一切聖衆唯願不違本誓憐愍有情降臨道場衆等和香花請印現壇儀據建壇儀云若無壇佛應結才發意轉法輪菩薩印印現壇儀千手眼修行儀云二手各作金剛拳進力檀慧相鉤誦真言曰唵斡資囉二合拶械囉二合吽一拶二吽三𠳐四斛五以印置身前即遍虛空界成大曼拏羅今應隨宗想滿虛空界五部主伴等忽爾明現此當文中建壇請聖已舉三十五佛般若心經七支加行畢首座秉爐胡跪白佛南無歸依十方盡虛空界一切諸佛南無歸依十方盡虛空界一切尊法南無歸依十方盡虛空界一切賢聖僧南無如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊南無釋迦牟尼佛南無金剛不壞佛南無寶光佛南無龍尊王佛南無精進軍佛南無精進喜佛南無寶火佛南無寶月光佛南無現無愚佛南無寶月佛南無無垢佛南無離垢佛南無勇施佛南無清淨佛南無清淨施佛南無娑留那佛南無水天佛南無堅德佛南無栴檀功德佛南無無量掬光佛南無光德佛南無無憂德佛南無那羅延佛南無功德花佛南無蓮華光遊戲神通佛南無財功德佛南無德念佛南無善名稱功德佛南無紅炎帝幢王佛南無善遊步功德佛南無鬪戰勝佛南無善遊步佛南無周匝莊嚴功德佛南無寶華遊步佛南無寶蓮華善住娑羅樹王佛南無法界藏身阿彌陀佛如是等一切世界諸佛世尊常住在世是諸世尊當慈念我若我此生若我前生從無始生死已來所作重罪若自作若教他作見作隨喜若塔若僧若四方僧物若自取若教他取見取隨喜五無間罪若自作若教他作見作隨喜十不善道若自作若教他作見作隨喜所作罪障或有覆藏或不覆藏應墮地獄餓鬼畜生諸餘惡趣邊地下賤及篾戾車如是等處所作罪障今皆懺悔今諸佛世尊當證知我當憶念我我復於諸佛世尊前作如是言若我此生若我餘生曾行布施或守淨戒乃至施與畜生一摶之食或修淨行所有善根成就衆生所有善根修行菩提所有善根及無上智所有善根一切合集校計籌量皆悉回向阿耨多羅三藐三菩提如過去未來現在諸佛所作回向我亦如是回向衆罪皆懺悔諸佛盡隨喜及諸佛功德願成無上智去來現在佛於衆生最勝無量功德海我今歸命禮所有十方世界中三世一切人師子我以清淨身語意一切遍禮盡無餘普賢行願威神力普現一切如來前一身復現剎塵身一一遍禮剎塵佛於一塵中塵數佛各處菩薩衆會中無盡法界塵亦然深信諸佛皆充滿各以一切音聲海普出無盡妙言詞盡於未來一切劫讚佛甚深功德海以諸最勝妙華鬘伎樂塗香及傘蓋如是最勝莊嚴具我以供養諸如來最勝衣服最勝香末香燒香與燈燭一一皆如妙高聚我悉供養諸如來我以廣大勝解心深信一切三世佛悉以普賢行願力普遍供養諸如來我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔十方一切諸衆生二乘有學及無學一切如來與菩薩所有功德皆隨喜十方所有世間燈最初成就菩提者我今一切皆勸請轉於無上妙法輪諸佛若欲示涅槃我悉至誠而勸請唯願久住剎塵劫利樂一切諸衆生所有禮讚供養福請佛住世轉法輪隨喜懺悔諸善根回向衆生及佛道願將以此勝功德回向無上真法界性相佛法及僧伽二諦融通三昧印如是無量功德海我今皆悉盡回向所有衆生身口意見惑彈謗我法等如是一切諸業障悉皆消滅盡無餘念念智周於法界廣度衆生皆不退乃至虛空世界盡衆生及業煩惱盡如是四法廣無邊願今回向亦如是啓告十方一切諸佛般若菩薩金剛天等及諸業道無量聖賢我今某甲以大慈悲乘佛神力召請十方盡虛空界三塗地獄諸惡趣中曠劫飢虛一切餓鬼閻羅諸司天曹地府業道冥官婆羅門仙久遠先亡曠野冥靈虛空諸天及諸眷屬異類鬼神唯願諸佛般若菩薩金剛天等無量聖賢及諸業道願賜威光悲增護念普願十方盡虛空界天曹地府業道冥官無量餓鬼多生父母先亡久遠婆羅門仙一切冤結負於財命種種類族異類鬼神各及眷屬乘如來力於此時中決定降臨得受如來上妙法味清淨甘露飲食充足滋潤身田福德智慧發菩提心永離邪行歸敬三寶行大慈心利益有情求無上道不受輪回諸惡苦果常生善家離諸怖畏身常清淨證無上道如是三白運心供養蘇悉地羯羅供養法下卷中説運心供養者想水陸諸華無主所攝遍滿十方盡虛空界及與人天妙塗香雲嬈香燈明幢幡傘蓋種種鼓樂歌舞妓唱真珠羅網懸諸寶鈴華鬘白拂微妙磬鐸矜羯尼網如意寶樹衣服之雲天諸厨食上妙香美種種樓閣寶柱莊嚴天諸嚴身頭冠瓔珞如是等雲行者運心想滿虛空以志誠心如是供養最為勝妙依法誦此真言及作手印如上所想供養悉皆成就真言曰那麻薩􅞣哩斡二合答塔葛的毗牙二合月説穆契毗牙二合唵引薩􅞣哩斡二合引塔龕烏忒葛二合的斯發二合囉納兮慢葛葛捺龕莎訶誦之七遍其手印相兩手相叉合掌以右壓左置於頂上凡作供養應具此法及奉瑜伽皆依真言手印持誦成就及以運心合掌置頂方成圓滿供養之法運心已云三寶施食將奉三寶施食先結三尖印禪押施度頭戒忍進疏伸誦真言唵引斡資囉二合拽屹徹二合吽念此真言三七遍想三指尖出大火光手動似扇遍諸魔已誦變空呪唵一莎發斡秫塔二薩􅞣哩斡二合塔哩麻二合三莎發斡秫徒㰠四誦此三遍想食器皆空於其空處想大寶器滿成甘露誦唵引啞吽二七遍攝受成智甘露即結奉食印仰二手二掌向前側相著二無名指頭側相著微屈二頭指博著中指側二大指博著頭指側小似掬水相誦奉食呪唵引啞葛嚕穆看薩􅞣哩斡二合塔􅝝哩麻二合喃啞牒耶引二合奴忒二合班納奴忒唵啞吽發吒􅁥莎訶想諸佛聖衆遍奉受用生歡喜心求索願事必蒙允許或廣迎聖入壇委伸供讚已然後施食即以香華燈塗種種供養畢默念奉食偈我今奉獻甘露食量等須彌無過上色香美味遍虛空上師三寶哀納受次供顯密護神等後及法界諸有情受用飽滿生歡悅屏除魔礙施安寧今辰施主眷屬等消災集福壽延長所求如意悉成就一切時中願吉祥衆等念三寶讚世尊大慈妙莊嚴明解圓滿一切智能施福慧如大海於諸如來我讚禮自性本體離諸欲能依此行脫惡趣以為甚深玄妙理於諸妙法我讚禮解脫道中勝解脫持淨戒行堪恭敬勝妙福田生勝處於彼大衆我讚禮次入觀音定即入觀自在菩薩三摩地閉目澄心觀想自身圓滿潔白猶如淨月在心淨月上想字放大光明其字變成八葉蓮華於華臺上有觀自在菩薩相好分明左手持蓮華右手作開敷葉勢是菩薩作是思惟一切有情身中各具有此覺悟之華清淨法界不染煩惱於蓮華八葉上各有如來入定跏趺而坐面向觀自在菩薩項佩圓光身如金色光明晃耀想此八葉蓮華漸舒漸大量等虛空即作如是思惟以此覺華照觸如來海會願成廣大供養若心不移此定則於無邊有情深起悲愍以此覺華蒙照觸者於諸苦惱悉得解脫等同觀自在菩薩相好即想蓮華漸漸收斂量等己身則結觀自在菩薩印加持四處所為心額喉頂每於印處成𠶹哩字其印以二手外相叉二頭指相拄如蓮華葉二大指並竪即誦觀自在菩薩真言曰次入觀音三摩地澄心閉目觀心中圓滿皎潔淨月上字種放光成蓮華華中有一觀自在相好具足無比對左手執持妙蓮華右手於葉作開勢菩薩思惟有情身各具覺悟之蓮華清淨法界無惑染八葉各有一如來如來入定跏趺坐各各面向觀自在項佩圓光身金色光明朗照極晃耀次想其華漸舒大其量周遍虛空界思彼覺華照法界如來海會供廣大心若不移於此定憐愍一切諸衆生覺華蒙照脫苦惱便同菩薩觀自在蓮華漸收同已量復結自在觀音印加持四處誦密言自身亦等觀自在唵引斡資囉二合塔􅝝囉麻二合紇哩二合由結此印誦真言加持心額喉頂故即自身等同觀自在菩薩正入定時念讚歎次結破地獄印二羽金剛拳檀慧兩相鉤進力竪側合心想開地獄三誦三掣開真言曰那麻阿瑟吒二合瑟吒二合攝諦喃三藐􅂴三勃塔俱胝喃唵引撮引辣引納嚩婆細提哩提哩吽此破地獄印呪出破阿毗地獄智炬陀羅尼經又準滅惡趣王本續説從印流出火光口誦神呪口出無量火光心月輪上紅色字放赤色火光三光同照阿毗地獄等三誦三掣關鎖自開所有罪人悉皆得出此舉難破偏云地獄若準下文理應光照通餘五趣意令專注故偏舉此由此印呪威神力故所有諸趣地獄之門隨此印呪豁然自開一心奉請衆生度盡方證菩提地獄未空誓不成佛大聖地藏王菩薩摩訶薩唯願不違本誓憐愍有情此夜今時來臨法會大衆和香花請一心奉請法界六道十類孤魂面然所統薜荔多衆塵沙種類依草附木魑魅魍魎滯魄孤魂自他先亡家親眷屬等衆唯願承三寶力仗祕密言此夜今時來臨法會如是三請次結召請餓鬼印左羽作無畏相右羽向前竪四度微曲進度鉤召真言曰唵即納即葛移希曳二合歇莎訶今此印呪出焰熾餓鬼母本續自身想觀自在菩薩心月輪上想紅色字印及字母流出光明照彼罪人口誦神呪隨光來至行者面前大衆讚善安慰云既召請已普皆雲集以愍念心讚歎慰喻令歡喜已渴仰於法善來諸佛子曾結勝緣故今遇此嘉會勿得生憂怖一心渴仰法不出於此時戒品而霑身速令離苦趣既至道場繞佛三匝投身布禮至回向已還禮聖衆退坐一面從壇東門至於南門地獄衆居復從南門至西南隅餓鬼衆居自西南隅至於西門畜生趣居自西門起至西北隅人趣宮室從西北隅至北方門修羅所居自北方門繞至東門天衆居位或無壇室自上至下勝劣居之亦得重坐色印如開合録説次結召罪印二羽金剛縛忍願伸如針進力曲如鉤召罪真言曰唵引薩􅞣哩斡二合巴鉢一羯哩二合沙拏二合二月戍馱納三斡資囉二合薩埵四薩麻耶五吽六拶七此上印呪出鉤罪經自身成觀自在菩薩心月輪上想白色字出鉤火光口誦心密言鉤攝一切有情三惡趣業并自身三惡趣業黑色如雲霧衆罪召入掌變成諸鬼形又金剛頂瑜伽念誦法云於進力度端各想有一字以鉤拽彼自他身中所有罪障誦密語已想彼罪形如鬼黑色髮竪即以二羽諸度各齊想鉤入掌內以進力二度鉤想彼罪令入掌中次結摧罪印八度內相叉忍願如前竪摧罪真言曰唵斡資囉二合巴尼月斯普二合吒耶薩􅞣哩斡二合阿巴耶班塔拏尼二不囉二合穆恰耶三薩􅞣哩斡二合阿巴耶葛諦毗藥二合四薩􅞣哩斡二合薩埵喃五薩􅞣哩斡二合答塔葛達六斡資囉二合三麻耶七吽八怛囉二合吒九今此印呪出鉤罪經身想觀音或準鉤罪經自身想成四面八臂青色觀音正面青色右面黃色左面緑色後面紅色二手結摧罪印右第二手持杵第三手箭第四手劍左第二手鉤第三手弓第四手羂索身出火光蓮華日輪上坐足踏烏麻怖畏如是想已心月輪上想青色字出光照前罪業相應將忍願三拍摧前衆罪形口誦狀密言罪相悉摧盡令滅無有餘又金剛頂瑜伽念誦法云於願度端想一答囉二合字忍度端想一吒字復於字上想生火焰夾取彼罪誦摧罪呪誦密語已用力撚之如彈指法左上右下或準金剛頂經身作降三世印觀獨股杵厲聲念真言忍願應三拍約文中云業報有二業中復有現行種子成就現行中有定不定今此印中滅不定業也次結定業印二羽金剛掌進力屈二節禪智押二度定業真言曰唵斡資囉二合葛哩麻二合一月束塔耶二薩􅞣哩斡二合阿咓囉拏儞三菩塔薩底曳二合納四三麻耶吽五此上印呪出不動本續有十二種諸佛不通懺悔定業印文云手結定業印自身想觀自在菩薩心月輪上想一青色𠶹哩二合字出光口誦心密言照前諸鬼等所有諸佛不通懺悔之業并自身三惡趣業轉重為輕重即定業此中轉滅麁重決定業故已上二印淨現行竟輕微種子滅罪印除次結懺悔滅罪印二羽金剛縛進力屈二節禪智押二度唵薩􅞣哩斡二合巴鉢一月斯普二合吒二怛賀納三斡資囉二合耶四莎訶此出滅惡趣王本續云自心月輪上想白色𠶹哩二合字出光遍照法界一切有情并前輕業悉皆消滅此中正滅輕微種子之業上來召請至此通滅罪障向下甘露開咽喉共除報障加持已云諸佛子等既懺悔已百劫積集罪一念頓蕩除如火焚枯草滅盡無有餘次結妙色身如來施甘露印或云施清涼印即以左羽轉腕向前力智作聲施甘露真言曰那麻蘇嚕巴耶一答塔葛達耶怛牒塔三唵四酥嚕酥嚕五鉢羅二合酥嚕六鉢囉二合酥嚕七莎訶誦真言時想於忍度上有一𮢥字流出般若甘露法水彈灑空中一切餓鬼異類鬼神普得清涼猛火息滅身田潤澤離飢渴想此出月密明點本續并須嚕巴本續云自身想觀自在菩薩心月輪上想白色字出光照前諸鬼神等并忍度上有一月輪上想𮢥字流出般若智甘露水力智彈灑至空中時如細雨而下著鬼神身上猛火息滅普得清涼離飢渴想滅心報障之業次結開咽喉印唵那謨發葛咓諦一月補辣葛得囉二合耶二答塔葛達耶三此廣博身如來開咽喉印依唧怛哩法師説師是加行位菩薩知之自身想觀自在菩薩心月輪上想一白色字出光照前鬼神等手結施清涼印口誦心密言并忍禪開左手蓮花時想鬼神等咽喉自開通達無礙便得出聲接得名號隨聞記云右禪度上想一月輪輪上想一白色阿字流出般若甘露法水以忍禪彈時左手蓮花開拆甘露滿中想諸鬼神咽隔開通清涼潤澤無所障礙語諸佛子今為汝等作印呪已咽喉自開通達無礙離諸障難諸佛子等我今為汝稱讚如來吉祥名號能令汝等永離三塗八難之苦常為如來真淨佛子南無寶勝如來次與鬼神同稱聖號若有大衆一切同稱二羽金剛掌六度內相叉進力頭相拄禪智側竪立那謨囉􅑈怛訥二合怛囉耶答塔葛達耶諸佛子等若聞寶勝如來名號能令汝等塵勞業火悉皆消滅南無離怖畏如來右羽胸前竪忍禪指相捻掌覆指垂下左掌向上振那謨微葛怛得囉二合納耶答塔葛達耶諸佛子等若聞離怖畏如來名號能令汝等常得安樂永離驚怖清淨快樂南無廣博身如來左羽曲如拳力智對肩彈右羽金剛拳進禪對胸彈那謨發葛咓諦一月補辣葛得囉二合耶答塔葛達耶二諸佛子等若聞廣博身如來名號能令汝等餓鬼針咽業火停燒清涼通達所受飲食得甘露味南無妙色身如來左羽竪胸前力智指相捻右羽曲舒展手掌皆仰下那謨蘇嚕八耶答塔葛達耶諸佛子等若聞妙色身如來名號能令汝等不受醜陋諸根具足相好圓滿殊勝端嚴天上人間最為第一南無多寶如來雙羽虛合掌胸前蓮華狀那謨波虎囉􅑈怛納二合耶答塔葛達耶諸佛子等若聞多寶如來名號能令汝等具足財寶稱意所須受用無盡南無阿彌陀如來右羽壓左禪智相拄那謨阿彌怛婆耶答塔葛達耶諸佛子等若聞阿彌陀如來名號能令汝等往生西方極樂淨土蓮華化生入不退地南無世間廣大威德自在光明如來右羽曲仰拳忍禪度相彈左掌仰上五指舒誦密呪那謨盧迦委斯諦二合􅛠呤捺二合弟唧説囉不囉二合發耶答塔葛達耶諸佛子等若聞世間廣大威德自在光明如來名號能令汝等獲得五種功德一者於諸世間最為第一二者得菩薩身端嚴殊勝三者威德廣大超過一切外道天魔如日照世顯於大海功德巍巍四者得大自在所向如意似鳥飛空而無阻礙五者得大堅固智慧光明身心明徹如琉璃珠諸佛子等此七如來以誓願力拔濟衆生永離煩惱脫三塗苦安隱常樂一稱其名千生離苦證無上道稱讚七佛由二益故一則總能除滅諸業報障二乃莊嚴彼等令成法器也次與汝等歸依三寶即以二手虛心合掌意想佛前作禮受戒云歸依佛兩足尊歸依法離欲尊歸依僧衆中尊汝等佛子歸依佛竟歸依法竟歸依僧竟歸依三寶故如法堅護持自離邪見道是故志心禮次結三寶印左羽作拳相竪力度當胸右手握力度心想誦真言唵婆重呼龕次與汝等發菩提心汝等諦次結發菩提心印二手金剛掌忍願如蓮花以印於心上應起三心四願或自發菩提心發願文云南無佛南無法南無僧我今發心不為自求人天福報緣覺聲聞乃至權乘諸位菩薩唯依最上乘發菩提心願與法界衆生一時同得阿耨多羅三藐三菩提三説今所發覺心遠離諸性相蘊處及界等能取所取執諸法悉無我平等如虛空自心本不生空性圓寂故如諸佛菩薩發大菩提心我亦如是發是故志心禮前偈三説誦發菩提心真言曰唵補提節答一沒怛巴二合二達野弭三心想月輪皎潔淨無瑕翳放光照諸鬼神口誦密言想前鬼神得菩提戒或想阿字遍入身心亦得云今與汝等發菩提心竟諸佛子等當知菩提心者從大悲起成佛正因智慧根本能破無明煩惱惡業不被染壞次與汝等受三昧耶戒既成大器堪受寶戒三昧耶者準大樂金剛三昧經云三昧名為本誓亦名時亦名期契亦名曼茶羅乃異名也故有四種一大二三昧耶三法四羯磨曼茶羅者此四總攝一切曼茶羅又三昧耶亦四智印即大智印三昧耶智印法智印羯磨智印又神變義釋云三昧耶者是平等義是本誓義是除障義是警覺義言平等者謂如來現證此三昧時一切衆生種種身語意皆悉與如來等禪定智慧與實相身亦畢竟等初發心時與地波羅密滿時亦畢竟等是故出誠諦言以告衆生若我所言必定不虛者亦令一切衆生發此忱諦之言時亦蒙三密加持無盡莊嚴與如來等以是因緣故能作金剛事業故名三昧耶也言本誓者如來現證此三昧時見一切衆生悉有成佛義故即將立大誓願我今要從普門以無量方便令一切衆生皆至無上菩提劑衆生界未盡已來我之事業終不休息若有衆生隨我本誓發此忱實言時亦令彼所為事業皆悉成金剛性故名三昧耶也言除障者如來見一切衆生悉有如來法界但由一念無明故常在其前而不覺知是故發誠實言我今要當設種種方便普為一切衆生決除眼膜若我誓願必當成就者令諸衆生隨我方便説此忱實言時乃至於一衆生獲無垢眼障蓋都盡故名三昧耶也言警覺義者如來以一切衆生皆在無明睡故於如是功德不自覺知故以誠言感動令得醒悟亦以此警覺諸菩薩等今發起禪定窟學師子頻伸三昧若直言行人説此三昧耶者我等諸佛亦當憶持本誓不得違越猶如國王自制法已遂自敬順行之故名三昧耶也具如是等廣大甚深微妙義故名三昧耶也次結三昧耶印二羽金剛縛忍願伸如針誦真言曰唵三摩耶薩埵鑁據本文意無別觀想但如印呪自成受戒如金剛頂經説若誦此呪一遍如入壇輪證三摩提一切善法皆悉滿足三聚淨戒俱時圓滿身同普賢坐大月輪一切諸佛憶昔本誓觀察護念設有人曾受佛戒惡心破毀不復清淨者若誦此呪一七遍已破戒罪垢悉得清淨一切戒品還得如故一切壇法未經師受誦呪七遍即許行作不成盜法或準神變經及義釋中以離念觀智乃當意密即神變經云若族姓子住是戒者當以身語意合而為一義釋三解一是共緣共成此戒之義所謂以方便等之所集成故二是平等義佛以三業合為一者即是住平等法門是故得名三世無障礙智戒也令此持明略戒若行人三業方便悉皆正順三平等處當知即具一切諸佛律儀也三裂諸相網是住此實相平等法界本性戒時無量三業皆同一相諸見相網皆悉除滅是故得名住無戲論金剛戒也或闕上深信解者擬加想念如隨聞記文云若付戒時印中想有白色鑁字放大光明普照所請一切有情彼諸有情蒙光照及三世諸佛戒波羅蜜一時圓滿法界善法想為光明流光灌頂貯彼身中身同普賢坐大月輪紹諸佛職為佛嫡子今與汝等受三昧耶戒竟從今已去能令汝等入如來位是真佛子從法化生得佛法分次結無量威德自在光明如來印左手想持器隨聞記云想字有據作如字理甚允當思之右羽彈忍禪想於左羽掌中有一鑁字流出種種無盡甘露法食印説施食真言曰唵薩􅞣哩斡二合答塔葛達一阿咓盧揭諦鑁二婆囉婆囉三三婆囉三婆囉四吽五語諸佛子今為汝等作印呪已變此一食為無量食大如須彌量同法界終無能盡復結前印誦乳海真言那麻薩鬘答勃塔喃鑁語諸佛子今為汝等作印呪已由此印呪加持威力想於印中流出甘露成於乳海流注法界普濟汝等一切有情充足飽滿前呪印中流多物食增此成廣此乳海呪唯流甘露通濟六道詳此二呪意通廣略廣則雙用即是此文略唯用前故有略儀隨文記意前呪七遍增成廣大記句甘露後呪三七遍流智甘露與記不二理亦可通此後可入障施鬼施食或名一彈指施食先洗漱口甲中食氣及施器中食器氣或未經用淨器內滿盛淨水已展右手誦障施鬼真言唵啞吽拶辣彌擔薩􅞣哩斡二合不哩二合的毗牙二合莎訶呪一遍或七遍障施鬼等飽滿歡喜彈指一下是時行者即以右羽持甘露器面向東立瀉於壇前或淨地上或於石上或新淨瓦盆亦名于蘭盆生臺亦得或泉池江海長流水中不得瀉於石榴桃樹之下鬼神懼怕不得食之若聖衆壇中明王諸天若施飲食置生臺上是本法也若供養諸佛聖衆於上五更晨朝日出是供養時若鬼神法於人定時子時亦得本人定時阿闍梨法若於齋時盡於一日但加持飲食水等布施飛空鳥獸水族之類不揀時節但用施之若作餓鬼施食之法當於亥時若於齋時施餓鬼食者徒設功勞終無效也不是時節妄生虛誑鬼神不得食也不從師受自招殃咎成盜法罪諸佛子等雖復方以類聚物以群分然我所施一切無礙無高無下平等普遍不擇冤親今日勿得以貴輕賤以強凌弱擁遏孤幼令不得食使不均平越佛慈濟必須互相愛念猶如父母一子之想語諸佛子汝等各有父母兄弟姊妹妻子眷屬善友親戚或有事緣來不得者汝等佛子慈悲愛念各各齎持飲食錢財物等遞相布施充足飽滿無有乏少令發道意永離三塗長越四流當捨此身速超道果又為汝等將此淨食分為三分一施水族令獲人空二施毛群令獲法寂三施他方稟識陶形悉令充足獲無生忍次結普供養印二中指屈者兩指尖上想白色唵字流出種種七寶樓閣宮殿幢幡寶蓋香花飲食無量七寶自己內外之財布施無量諸佛聖賢并諸有情等誦普供養真言曰唵一葛葛納三婆斡斡資囉二合解二想從印流出諸供具物普供三寶及六道衆生詳普供意上來到此法事周圓故以生佛普平伸供供畢索願意在奉送文從下索影上必然矣或名普通供養諸佛子等從來所受飲食皆是人間販鬻生命酒脯錢財血肉腥羶葷辛臭穢雖復受得如是飲食譬如毒藥損壞於身但增苦本沈淪苦海無解脫時我某甲依如來教精誠罄捨設此無遮廣大法會汝等今日遇茲勝事戒品霑身於過去世廣事諸佛親近善友供養三寶由此因緣值善知識發菩提心誓願成佛不求餘果先得道者遞相度脫又願汝等晝夜恆常擁護於我滿我所願以此施食所生功德普將回施法界有情共諸有情同將此福盡皆回施無上菩提一切智智勿招餘果願速成佛次結奉送印二羽金剛拳進力二相鉤隨誦而掣開金剛解脫真言曰唵斡資囉二合穆一意想佛等各歸本位六道衆生悅樂超升為上良因普皆回施如常可知矣佛頂尊勝陀羅尼神呪唵普二合莎引訶引唵捺謨發葛斡諦薩􅞣哩斡二合的唻二合盧結不囉二合牒月攝瑟吒二合耶勃塔耶諦捺麻答爹塔唵普二合普二合普二合菽塔耶菽塔耶月菽塔耶月菽塔耶啞薩麻薩蠻達斡發薩斯發二合囉納葛牒葛葛捺莎發斡月説提啞撇羶贊多𤚥薩􅞣哩斡二合怛塔葛達莎葛達斡囉斡拶納美哩二合達撇釋該摩訶抹的囉二合瞞的囉二合巴代阿訶囉阿訶囉摩麻猶傘塔囉聶菽塔耶菽塔耶月菽塔耶月菽塔耶葛葛捺莎發斡月説提烏瑟𤤗二合攝月拶耶八哩説提薩訶斯囉二合囉􅊶釋咩二合傘祖牒敵薩􅞣哩斡二合怛塔葛達引斡盧結聶沙翅巴二合囉咩達八咧補囉聶薩􅞣哩斡二合怛塔葛達麻諦答舍普咩不囉二合牒瑟吒二合敵薩􅞣哩斡二合怛塔葛達赫囉二合答牙鐵瑟吒二合納鐵瑟吒二合敵摩的哩二合摩的哩二合麻訶摩的哩二合斡資哩二合斡資哩二合麻訶斡資哩二合斡資囉二合葛耶三訶怛捺八咧説提薩􅞣哩斡二合葛􅝝哩麻二合斡囉捺月説提不羅牒尼斡哩怛二合耶摩麻猶哩二合月説提薩􅞣哩斡二合怛塔葛達薩摩牙鐵瑟吒二合納鐵瑟吒二合敵唵摩𤤗摩𤤗麻訶摩𤤗月摩𤤗月摩𤤗麻訶月摩𤤗麻牒麻牒麻訶麻牒摩摩牒莎麻牒怛塔達普怛孤宅八咧説提月斯蒲二合吒勃鐵説提兮兮拶耶拶耶月拶耶月拶耶􅋌斯麻二合囉􅋌斯麻二合囉斯發二合囉斯發二合囉斯發二合囉耶斯發二合囉耶薩􅞣哩斡二合勃􅁥塔鐵瑟吒二合納鐵瑟吒二合敵説提説提勃提勃提斡資哩二合斡資哩二合麻訶斡資哩二合莎斡資哩二合斡資囉二合葛􅞥哩毗二合拶耶葛􅞥哩毗二合月拶耶葛􅞥哩毗二合斡資囉二合佐辣葛􅞥哩毗二合斡卒嚕二合忒發二合微斡資囉二合參發微斡資哩二合斡即哩二合聶斡資囕二合發斡多摩摩攝哩囕薩􅞣哩斡二合薩埵喃拶葛耶八咧説鐵發斡多薩埵彌薩􅞣哩斡二合達薩􅞣哩斡二合葛爹八哩説提實哲二合薩􅞣哩斡二合答塔葛達實哲二合𤚥薩麻􅁤刷薩顏多勃鐵勃鐵薛鐵薛鐵譜塔耶譜塔耶月譜塔耶月譜塔耶謨拶耶謨拶耶月謨拶耶月謨拶耶菽塔耶菽塔耶月菽塔耶月菽塔耶薩􅞣蠻達謨拶耶謨拶耶薩􅞣蠻怛囉􅋎釋迷二合八咧説提薩􅞣哩斡二合怛塔葛達赫囉二合答牙鐵瑟吒納鐵瑟吒二合敵摩特哩二合摩特哩二合麻訶摩特哩二合麻訶摩特囉二合瞞的囉二合芭諦莎引訶引六趣偈承斯善利地獄受苦有情者刀山劍樹變化皆成如意樹火團鐵丸變成蓮華而為寶吉祥地獄解脫而能成正覺承斯善利餓鬼受苦有情者口中煙焰燒身速願得清涼觀音手內甘露自然長飽滿吉祥餓鬼解脫而能成正覺承斯善利畜生受苦有情者殺害燒煮楚毒等苦皆遠離遠離乘騎愚癡速得大智慧吉祥畜生解脫而能成正覺承斯善利人間受苦有情者生時猶如摩耶右脅而降誕願具六根永離八難修福慧吉祥人間解脫而能成正覺承斯善利修羅受苦有情者我慢顛狂拙朴速疾令柔善惡心嫉妬嗔恚鬪戰自調伏吉祥修羅解脫而能成正覺承斯善利天中受樂有情者欲樂策勤速發廣大菩提心天中受盡憂苦自然生歡悅吉祥天中解脫而能成正覺承斯善利十方獨覺聲聞者棄捨小乘四諦十二因緣行進趣大乘修四攝六度萬應吉祥二乘解脫而能成正覺承斯善利初地菩薩勇識者百福莊嚴一切行願皆圓滿頓超十地證入一生補處位吉祥三乘速證究竟成正覺發願回向偈現世之中未證菩提間願無內外障難惡緣等恆常遇逢最妙善知識所修善事行願速成就最上三寶臨命終時識性無迷惑願生西方淨土如來前依於慧日發光聞思修斷惑證真愍念於有情最上三寶若或隨業淨土佛會前若無善根不生聖會中隨業輪回世世所生處恆修善根熏習無間斷最上三寶願生中國勤修於正法無病長壽受用悉具足相好殊勝辨才智慧等具七功德獲得丈夫身最上三寶幼年出家願逢賢聖師即得三種修學守護持一切時中正念與正定承侍微妙上師願歡喜最上三寶七種勝財殊勝善知識如日與光剎那不捨離亦無我慢疑惑具知足惡緣猶如蠱毒願捨離最上三寶功德本願最上三寶處願能恆常歸依而供養貪欲嗔恚愚癡三種毒猶如大地恆常勿應起最上三寶觀見六塵境界色等法猶如陽焰幻化而悟解五欲自性境處無染著願我恆不忘失菩提心最上三寶一切大乘甚深微妙法如救頭然精進常修學證得無比究竟菩提時以四攝法能救於六趣最上三寶能救五濁大悲觀世音末劫之時弘願地藏王所有一切賢聖護法神證明護念法燈覆熾然最上三寶護國護法塔廟諸護神威德熾盛回遮大結界怨魔外道毒類悉摧壞龍鬼星辰毒類心驚怖最上三寶三災五濁速願得消除七難八怖一念皆消滅百穀豐饒萬物而茂盛七寶充足五味悉具足最上三寶四事供養受用無乏少修八福田吉祥獲安樂普國興隆佛事轉法輪增長有情福慧皆圓滿最上三寶我等善根緣起法性力上師本尊空行攝受力三寶真諦密呪威神力所發願時行願速成就最上三寶能回施人回施回施善所獲一切一切諸功德猶如幻化幻化似夢境三輪體空體空悉清寧最上三寶吉祥偈願晝吉祥夜吉祥上師願攝受晝夜六時恆吉祥願諸三寶願攝受一切時中吉祥者護法恆擁護南無西方無量壽如來諸大菩薩海會聖衆唯願法界存亡等罪消除同生淨土至此隨意回施已次念金剛薩埵百字呪金剛薩埵百字呪唵一斡資囉二合薩埵蘇薩麻耶麻納巴辣耶二斡資囉二合薩埵諦奴鉢諦瑟劄二合三得哩二合鋤彌發咓四蘇度束彌發咓五阿奴囉屹都二合彌發咓六蘇布束彌發咓七薩􅞣哩咓二合些提彌不囉二合耶擦八薩􅞣哩斡葛哩麻二合蘇拶彌九穆達釋哩二合楊郭嚕十吽十一訶訶訶訶斛十二發葛灣薩􅞣哩咓二合答塔葛達斡資囉二合麻彌捫拶十三斡資哩二合發咓十四麻訶薩摩耶薩埵阿引十五此呪求願補闕功德無量散在諸經又名句中隨宗回轉誦者知之瑜伽集要焰口施食儀竟十類孤魂文南無十方三世盡虛空界常住佛法僧寶上師本尊臨時應入佛名猛母明王世出世間護法善神慈悲廣大誓願弘深威力難量盡知盡見願作證明哀愍護念法界地府獄中閻羅天子十八獄帝三十大王三十三王三十六王十八獄主牛頭阿傍馬頭羅剎主命主攝無毒鬼王九位二十四司助王小臣掌部首領執杖主淨主水主鐵主土主火善惡童子一切功曹獄吏騬馬執鎗一切羅叉又地上檢察者帝釋四王太子諸將六齋八王三十二忍臣四忍大王五道大神又十類孤魂者第一法界一切守疆護界陳力委命軍陳相持為國亡身官員將士兵卒孤魂衆第二法界一切負財欠命情識拘繫生産致命冤家債主墮胎孤魂衆第三法界一切輕薄三寶不孝父母十惡五逆邪見孤魂衆第四法界一切江河水溺大海為商風浪飄沈採寶孤魂衆第五法界一切邊地邪見致命蠻夷孤魂衆第六法界一切拋離鄉并客死他州無依無托遊蕩孤魂衆第七法界一切河井刀索赴火投崖牆崩屋倒樹折嵓摧獸咬蟲傷橫死孤魂衆第八法界一切獄中致命不遵王法賊寇劫盜抱屈銜冤大辟分尸犯法孤魂衆第九法界一切奴婢給使勤勞陳力委命貧賤孤魂衆第十法界一切盲聾瘖啞足跛手𤷄疾病纏綿癰疽殘害鰥寡孤獨無靠孤魂衆又法界面然鬼王所統薜荔部多百億河沙餓鬼非我見聞有名無名塵沙種族人間依於草木附彼城隍銜冤魂識品物精靈自殘自盡軍陳亡身無依無托遣骸暴骨乏祭餒魂魑魅魍魎幽魂滯魄靈響等衆又有大力鬼妖魅鬼惱人鬼內障鬼外障鬼無礙鬼又有九類十類三十六類鬼衆惟願佛法僧寶力法界緣起力大悲觀音力深願地藏力今我所觀功德力祕密呪印加持力稱七如來名號力誦經法會善根力今皆召請法界孤魂餓鬼種類一切眷屬如雲而集變此飲食於虛空中遍滿法界一切山原大地涌出清冷之池所有碧沼江河變成廣大乳海十二類生法食飽滿二十五有樂具資圓三業澄明六根清淨身心輕安清涼快樂福智增輝所求願滿歸依三寶發菩提心修菩薩行得成佛道衆等應和隨願所成蓋以冥關路渺苦海波深若非密呪之功曷薦沈淪之魄由是特建法筵虔集僧衆諷演祕密真言加持上妙法食如斯勝利普施無邊伏願鑊湯滾滾變八德之蓮池爐炭炎炎成六銖之香蓋森森劍樹為三會之龍華岌岌刀山作五天之鷲嶺銅汁銅柱化甘露之法幢鐵磨鐵丸作摩尼之寶座牛頭獄卒持三善而證三身債主冤家解十纏而離十惡多生父母從茲而入聖超凡一切衆生自此而獲安獲樂修習道友隨喜檀那悟本性之彌陀了唯心之淨土普同法界遍及有情俱沐良緣齊成佛道者矣三歸依讚志心信禮佛陀耶兩足尊三覺圓萬德具天人調御師啞吽凡聖大慈父從真界騰應質悲化普竪窮三際時橫遍十方處震法雷鳴法鼓廣演權實教啞吽大開方便路若歸依能消滅地獄苦志心信禮達摩耶離欲尊寶藏收玉函軸結集於西域啞吽翻譯傳東土祖師弘賢哲判成章疏三乘分頓漸五教定宗趣鬼神欽龍天護導迷標月指啞吽除熱真甘露若歸依能消滅餓鬼苦志心信禮僧伽耶衆中尊五德師六和侶利生為事業啞吽弘法是家務避囂塵常宴坐寂靜處遮身服毳衣充腹採新茹鉢降龍錫解虎法燈常遍照啞吽祖印相傳付若歸依能消滅傍生苦
